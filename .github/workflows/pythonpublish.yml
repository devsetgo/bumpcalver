name: Upload Python Package

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  trigger-docs:
    name: Trigger documentation deployment
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch deploy-docs workflow
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'release') {
              core.info('Not a release event — skipping docs dispatch.');
              return;
            }
            const rawTag = context.payload.release?.tag_name;
            if (!rawTag) {
              core.setFailed('Missing release.tag_name; cannot dispatch docs build.');
              return;
            }
            const version = rawTag.startsWith('v') ? rawTag.slice(1) : rawTag;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-docs.yml',
              ref: 'main',
              inputs: {
                version,
                checkout_ref: rawTag,
                aliases: 'latest stable',
              },
            });
            core.info(`Dispatched deploy-docs.yml (checkout_ref=${rawTag}, version=${version})`);
