# Example configuration for the properties, .env, and setup.cfg file type handlers.
# Copy the [[tool.bumpcalver.file]] entries you need into your own pyproject.toml.

[tool.bumpcalver]
version_format = "{current_date}-{build_count:03}"
date_format = "%Y-%m-%d"
timezone = "America/New_York"
git_tag = true
auto_commit = true

# Properties file (e.g., sonar-project.properties)
[[tool.bumpcalver.file]]
path = "sonar-project.properties"
file_type = "properties"
variable = "sonar.projectVersion"

# Environment file
[[tool.bumpcalver.file]]
path = ".env"
file_type = "env"
variable = "VERSION"

# setup.cfg — dot-notation targets a specific section key
[[tool.bumpcalver.file]]
path = "setup.cfg"
file_type = "setup.cfg"
variable = "metadata.version"

# Python __init__.py
[[tool.bumpcalver.file]]
path = "src/myproject/__init__.py"
file_type = "python"
variable = "__version__"
